<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Abuse | 1.21.11 Beta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent-blue: #3d5afe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, var(--bg-dark));
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            padding: 40px;
            text-align: center;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .beta-badge {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(61, 90, 254, 0.15);
            color: var(--accent-blue);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(61, 90, 254, 0.3);
            display: inline-block;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0 0 16px 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .download-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 18px 45px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            filter: brightness(1.1);
        }

        .links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .links a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--accent-blue);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent-blue);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 0;
            border-radius: 50%;
            top: -100px;
            left: -100px;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <div class="glass-card">
            <div class="beta-badge">Early Access Beta</div>
            <h1>Admin Abuse</h1>
            <p>A specialized utility suite for 1.21.11 anarchy. <br>Built for the clan, by the clan.</p>
            
            <a href="https://github.com/overyr8-sys/Admin-Abuse-Client/releases/latest" class="download-btn">Download 1.0 Beta</a>

            <div class="links">
                <a href="https://discord.gg/xhBaVqn5jq">Client Discord</a>
                <a href="https://discord.gg/pxKzEMzmUz">Clan Discord</a>
                <a href="https://github.com/overyr8-sys/Admin-Abuse-Client">Source Code</a>
            </div>
        </div>
    </div>
</body>
</html>
